<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4 × 3 — Past puzzles</title>
<script>(function(){var p=location.pathname;if(!/\/$/.test(p)){if(/\.[^\/]+$/.test(p))p=p.replace(/[^\/]*$/,"");else p+="/";}var b=document.createElement("base");b.setAttribute("href",p);document.head.appendChild(b);})();</script>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="icon" href="favicon-32.png" type="image/png" sizes="32x32">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="stylesheet" href="shared.css">
<script src="shared.js"></script>
<script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
<div class="wrap">
  <header>
    <a href="index.html" style="display:block"><img class="logo" src="fourbythreelogo.png" alt="4 × 3"></a>
    <div class="tag">Replay any earlier daily.</div>
  </header>
  <div class="card">
    <b>Past puzzles</b>
    <div class="hint">Playing an old one won't affect today's game.</div>
    <div id="archiveList" class="archlist"></div>
  </div>
  <footer>
    <nav class="foot-links"><a href="index.html">← back to the game</a><a href="history.html">history</a><a href="community.html">community puzzles</a><a href="https://hankgreen.com/smush">SMUSH</a></nav>
  </footer>
</div>
<script>
"use strict";
async function renderArchive(){
  const el=document.getElementById("archiveList");
  el.innerHTML="<div class='hint'>Loading…</div>";
  let data=null, failed=false;
  try{
    const r=await fetch(pjURL(),{cache:"no-store"});
    if(r.ok) data=await r.json(); else failed=true;
  }catch(e){ failed=true; }
  data=data||{};
  const today=todayStr();
  const keys=Object.keys(data).filter(k=>k<=today).sort().reverse();
  if(!keys.length){
    el.innerHTML="<div class='hint'>"+(failed
      ? "Couldn't load the puzzle list — if you opened this file directly, run it through a local server or the live site so it can fetch puzzles.json."
      : "No puzzles yet.")+"</div>";
    return;
  }
  el.innerHTML="";
  keys.forEach(k=>{
    const b=document.createElement("button");
    b.innerHTML="<span>"+esc(fmtDate(k))+"</span>"+
      "<span class='when'>"+(k===today?"Today":"")+"</span>";
    b.onclick=()=>{ location.href="index.html#d="+k; };
    el.appendChild(b);
  });
}
renderArchive();
</script>
</body>
</html>
